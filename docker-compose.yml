version: '3.8'

services:
  app:
    # 使用 Docker Hub 镜像（推荐生产环境）
    # 取消注释下面一行，并注释掉 build 部分，即可使用 Docker Hub 的镜像
    # image: wrbug/polyhermes:latest
    build:
      context: .
      dockerfile: Dockerfile
      # 本地构建时可以传递版本号参数（自动使用当前分支名）
      args:
        VERSION: ${VERSION:-dev}
        GIT_TAG: ${GIT_TAG:-${VERSION:-dev}}
        GITHUB_REPO_URL: ${GITHUB_REPO_URL:-https://github.com/WrBug/PolyHermes}
    container_name: polyhermes
    ports:
      - "${SERVER_PORT:-80}:80"
    env_file:
      - .env
    environment:
      # 容器内部固定监听 8000，由 Nginx/入口脚本统一代理
      - SERVER_PORT=8000
    volumes:
      - /etc/localtime:/etc/localtime:ro
    depends_on:
      mysql:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - polyhermes-network

  mysql:
    image: mysql:8.2
    container_name: polyhermes-mysql
    ports:
      - "${MYSQL_PORT:-3307}:3306"
    env_file:
      - .env
    environment:
      - MYSQL_DATABASE=polyhermes
      - MYSQL_CHARACTER_SET_SERVER=utf8mb4
      - MYSQL_COLLATION_SERVER=utf8mb4_unicode_ci
    volumes:
      - mysql-data:/var/lib/mysql
      - /etc/localtime:/etc/localtime:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${DB_PASSWORD:-rootpassword}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - polyhermes-network

volumes:
  mysql-data:

networks:
  polyhermes-network:
    driver: bridge

