version: '3.8'

# PolyHermes 生产环境部署配置
# 使用 Docker Hub 官方镜像，无需本地构建
#
# 使用方法：
# 1. 创建 .env 文件（参考 .env.example）
# 2. 运行: docker-compose -f docker-compose.prod.yml up -d
#
# 注意：
# - JWT_SECRET 和 ADMIN_RESET_PASSWORD_KEY 不能使用默认值
# - 请使用 openssl rand -hex 生成安全的随机密钥

services:
  app:
    # 使用 Docker Hub 官方镜像
    image: wrbug/polyhermes:latest
    container_name: polyhermes
    ports:
      - "${SERVER_PORT:-80}:80"
    env_file:
      - .env
    environment:
      # 容器内部固定监听 8000，由 Nginx/入口脚本统一代理
      - SERVER_PORT=8000
    volumes:
      - /etc/localtime:/etc/localtime:ro
    depends_on:
      mysql:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - polyhermes-network

  mysql:
    image: mysql:8.2
    container_name: polyhermes-mysql
    ports:
      - "${MYSQL_PORT:-3307}:3306"
    env_file:
      - .env
    environment:
      - MYSQL_DATABASE=polyhermes
      - MYSQL_CHARACTER_SET_SERVER=utf8mb4
      - MYSQL_COLLATION_SERVER=utf8mb4_unicode_ci
    volumes:
      - mysql-data:/var/lib/mysql
      - /etc/localtime:/etc/localtime:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${DB_PASSWORD:-rootpassword}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - polyhermes-network

volumes:
  mysql-data:

networks:
  polyhermes-network:
    driver: bridge

